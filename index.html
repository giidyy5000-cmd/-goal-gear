<!DOCTYPE html>
<html>
<head>
    <title>World Cup Heads Up</title>

    <style>
        body {
            font-family: Arial;
            background-color: #0b6623;
            color: white;
            text-align: center;
        }

        .card {
            background: black;
            margin: 50px auto;
            padding: 40px;
            width: 60%;
            border-radius: 15px;
        }

        h1 {
            color: gold;
        }

        #word {
            font-size: 40px;
            margin: 20px;
        }

        button {
            padding: 15px;
            margin: 10px;
            width: 150px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
        }

        .correct {
            background-color: green;
            color: white;
        }

        .skip {
            background-color: red;
            color: white;
        }
    </style>
</head>

<body>

<h1>🌍⚽ World Cup Heads Up</h1>

<div class="card">

    <p>Hold the screen to your forehead. Your friend gives clues!</p>

    <div id="word">Press Start</div>

    <button onclick="startGame()">Start</button>
    <br>

    <button class="correct" onclick="correct()">✅ Correct</button>
    <button class="skip" onclick="skip()">⏭️ Skip</button>

    <h2 id="score">Score: 0</h2>
</div>

<script>
    let words = [
        "Messi",
        "Ronaldo",
        "Brazil",
        "World Cup",
        "Penalty",
        "Offside",
        "Mbappe",
        "Argentina",
        "Goalkeeper",
        "Corner Kick"
    ];

    let score = 0;
    let currentWord = "";

    function startGame() {
        score = 0;
        document.getElementById("score").innerText = "Score: 0";
        nextWord();
    }

    function nextWord() {
        let randomIndex = Math.floor(Math.random() * words.length);
        currentWord = words[randomIndex];
        document.getElementById("word").innerText = currentWord;
    }

    function correct() {
        score++;
        document.getElementById("score").innerText = "Score: " + score;
        nextWord();
    }

    function skip() {
        nextWord();
    }
</script>

</body>
</html>
