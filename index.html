<!DOCTYPE html>
<html>
<head>
  <title>Goal Gear</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f4f4;
    }

    header {
      background: #0b6623;
      color: white;
      padding: 20px;
      text-align: center;
    }

    .store {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .item {
      background: white;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      padding: 15px;
      text-align: center;
    }

    .item img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 8px;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      width: 100%;
      background: #1db954;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #159143;
    }

    .cart {
      background: white;
      margin: 20px;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
  </style>
</head>

<body>

<header>
  <h1>⚽ Goal Gear</h1>
  <p>Soccer equipment built for every player</p>
</header>

<div class="store">

  <div class="item">
