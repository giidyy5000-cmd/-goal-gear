<!DOCTYPE html>
<html>
<head>
    <title>Tech Troubleshooting Jeopardy</title>

    <style>
        body {
            font-family: Arial;
            background-color: #0a0a0a;
            color: white;
            text-align: center;
        }

        h1 {
            color: gold;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            width: 80%;
            margin: auto;
        }

        .cell {
            background: #1e90ff;
            padding: 20px;
            cursor: pointer;
            border-radius: 8px;
            font-weight: bold;
        }

        .cell:hover {
            background: gold;
            color: black;
        }

        .box {
            margin: 20px auto;
            width: 70%;
            background: #222;
            padding: 20px;
            border-radius: 10px;
        }

        button {
            padding: 10px;
            margin: 5px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
        }

        .correct { background: green; color: white; }
        .wrong { background: red; color: white; }
    </style>
</head>

<body>

<h1>💻 Tech Troubleshooting Jeopardy</h1>

<h3 id="turn">Team 1 Turn</h3>

<div class="board">

    <div class="cell" onclick="select(0)">Network<br>$100</div>
    <div class="cell" onclick="select(1)">Hardware<br>$100</div>
    <div class="cell" onclick="select(2)">Software<br>$100</div>
    <div class="cell" onclick="select(3)">Security<br>$100</div>

    <div class="cell" onclick="select(4)">Network<br>$200</div>
    <div class="cell" onclick="select(5)">Hardware<br>$200</div>
    <div class="cell" onclick="select(6)">Software<br>$200</div>
    <div class="cell" onclick="select(7)">Security<br>$200</div>

    <div class="cell" onclick="select(8)">Network<br>$300</div>
    <div class="cell" onclick="select(9)">Hardware<br>$300</div>
    <div class="cell" onclick="select(10)">Software<br>$300</div>
    <div class="cell" onclick="select(11)">Security<br>$300</div>

</div>

<div class="box">
    <h2 id="question">Pick a box to start</h2>

    <button class="correct" onclick="correct()">Correct</button>
    <button class="wrong" onclick="wrong()">Wrong</button>

    <h3 id="score">Team 1: 0 | Team 2: 0</h3>
</div>

<script>
let team = 1;
let score1 = 0;
let score2 = 0;
let currentValue = 0;

let questions = [
    "What should you do if WiFi is not working? (Restart router)",
    "What fixes a frozen computer? (Restart system)",
    "What causes slow PC? (Too many apps running)",
    "What is phishing? (Fake emails stealing info)",

    "Why won’t a printer print? (No connection/paper)",
    "What is a hardware issue? (Broken physical part)",
    "What does RAM do? (Temporary memory)",
    "What is a virus? (Malicious software)",

    "What fixes app crashing? (Update/reinstall app)",
    "What is safe mode? (Diagnostic startup mode)",
    "What is cache? (Temporary stored data)",
    "How to remove malware? (Antivirus scan)"
];

function select(index) {
    document.getElementById("question").innerText = questions[index];

    if (index < 4) currentValue = 100;
    else if (index < 8) currentValue = 200;
    else currentValue = 300;
}

function correct() {
    if (team === 1) score1 += currentValue;
    else score2 += currentValue;

    nextTurn();
}

function wrong() {
    nextTurn();
}

function nextTurn() {
    team = team === 1 ? 2 : 1;

    document.getElementById("turn").innerText = "Team " + team + " Turn";
    document.getElementById("score").innerText =
        "Team 1: " + score1 + " | Team 2: " + score2;

    document.getElementById("question").innerText = "Pick another box";
}
</script>

</body>
</html>
