<!DOCTYPE html>
<html>
<head>
  <title>Goal Gear</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f4f4;
    }

    header {
      background: #0b6623;
      color: white;
      padding: 20px;
      text-align: center;
    }

    .store {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .item {
      background: white;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      padding: 15px;
      text-align: center;
    }

    .item img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 8px;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      width: 100%;
      background: #1db954;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #159143;
    }

    .cart {
      background: white;
      margin: 20px;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
  </style>
</head>

<body>

<header>
  <h1>⚽ Goal Gear</h1>
  <p>Soccer equipment built for every player</p>
</header>

<div class="store">

  <div class="item">
    <img src="https://images.unsplash.com/photo-1600880292203-757bb62b4baf">
    <h3>Shin Guards</h3>
    <p>$20</p>
    <button onclick="add('Shin Guards',20)">Add to Cart</button>
  </div>

  <div class="item">
    <img src="https://images.unsplash.com/photo-1605351797709-11b4a59d3f79">
    <h3>Goalie Gloves</h3>
    <p>$35</p>
    <button onclick="add('Goalie Gloves',35)">Add to Cart</button>
  </div>

  <div class="item">
    <img src="https://images.unsplash.com/photo-1521412644187-c49fa049e84d">
    <h3>Cleats</h3>
    <p>$60</p>
    <button onclick="add('Cleats',60)">Add to Cart</button>
  </div>

  <div class="item">
    <img src="https://images.unsplash.com/photo-1517927033932-b3d18e61fb3a">
    <h3>Soccer Ball</h3>
    <p>$25</p>
    <button onclick="add('Soccer Ball',25)">Add to Cart</button>
  </div>

</div>

<div class="cart">
  <h2>🛒 Cart</h2>
  <p id="cart">Empty</p>
  <p>Items Total: $<span id="items">0</span></p>
  <p>Shipping: $10</p>
  <p><b>Total: $<span id="total">0</span></b></p>
  <button onclick="buy()">Buy Now</button>
</div>

<script>
  var cart = [];
  var itemsTotal = 0;
  var shipping = 10;

  function add(item, price) {
    cart.push(item);
    itemsTotal += price;
    document.getElementById("cart").innerText = cart.join(", ");
    document.getElementById("items").innerText = itemsTotal;
    document.getElementById("total").innerText = itemsTotal + shipping;
  }

  function buy() {
    alert("Order placed!\nTotal: $" + (itemsTotal + shipping));
    cart = [];
    itemsTotal = 0;
    document.getElementById("cart").innerText = "Empty";
    document.getElementById("items").innerText = 0;
    document.getElementById("total").innerText = 0;
  }
</script>

</body>
</html>
``
