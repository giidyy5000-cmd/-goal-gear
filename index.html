<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heads Up! Word Challenge</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --anime-pink: #ff61d8;
            --cartoon-blue: #4db8ff;
            --game-green: #4caf50;
            --easy: #2ecc71;
            --medium: #f1c40f;
            --hard: #e67e22;
            --extreme: #e74c3c;
            --gradient: linear-gradient(90deg, #ff00cc, #3333ff);
        }

        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            font-style: italic;
            text-transform: uppercase;
            background: linear-gradient(to bottom, #ff61d8, #4db8ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .sub-header {
            color: #aaa;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        h3 {
            text-align: left;
            text-transform: uppercase;
            font-size: 0.9rem;
            color: #eee;
            margin-top: 20px;
        }

        /* Selection Grids */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .difficulty-grid {
            grid-template-columns: repeat(4, 1fr);
        }

        .option {
            background: var(--card-bg);
            border: 2px solid transparent;
            border-radius: 12px;
            padding: 15px 5px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-weight: bold;
            font-size: 0.8rem;
        }

        /* Specific Colors */
        .option[data-type="anime"].active { border-color: var(--anime-pink); color: var(--anime-pink); box-shadow: 0 0 10px var(--anime-pink); }
        .option[data-type="cartoons"].active { border-color: var(--cartoon-blue); color: var(--cartoon-blue); box-shadow: 0 0 10px var(--cartoon-blue); }
        .option[data-type="games"].active { border-color: var(--game-green); color: var(--game-green); box-shadow: 0 0 10px var(--game-green); }
        
        .diff.active { border-color: white; }
        .diff[data-val="easy"].active { color: var(--easy); border-color: var(--easy); }
        .diff[data-val="medium"].active { color: var(--medium); border-color: var(--medium); }
        .diff[data-val="hard"].active { color: var(--hard); border-color: var(--hard); }
        .diff[data-val="extreme"].active { color: var(--extreme); border-color: var(--extreme); }

        .time-option.active { border-color: #a855f7; color: #a855f7; }

        /* Start Button */
        .start-btn {
            width: 100%;
            padding: 20px;
            margin-top: 30px;
            border-radius: 15px;
            border: none;
            background: var(--gradient);
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 0, 204, 0.4);
        }

        /* Game Screen */
        #game-screen {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color);
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .word-display {
            font-size: 4rem;
            font-weight: 900;
            text-align: center;
            margin: 20px;
        }

        .team-indicator {
            font-size: 1.5rem;
            color: #ff61d8;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="container" id="setup-screen">
    <h1>HEADS UP!</h1>
    <div class="sub-header">🎮 TWO TEAM WORD CHALLENGE</div>

    <h3>🎯 CHOOSE CATEGORY</h3>
    <div class="grid">
        <div class="option active" data-type="anime" onclick="select('cat', this)">🌸<br>ANIME</div>
        <div class="option" data-type="cartoons" onclick="select('cat', this)">📺<br>CARTOONS</div>
        <div class="option" data-type="games" onclick="select('cat', this)">🎮<br>GAMES</div>
    </div>

    <h3>⚡ DIFFICULTY</h3>
    <div class="grid difficulty-grid">
        <div class="option diff active" data-val="easy" onclick="select('diff', this)">⭐<br>EASY</div>
        <div class="option diff" data-val="medium" onclick="select('diff', this)">⭐⭐<br>MEDIUM</div>
        <div class="option diff" data-val="hard" onclick="select('diff', this)">⭐⭐⭐<br>HARD</div>
        <div class="option diff" data-val="extreme" onclick="select('diff', this)">💀💀<br>EXTREME</div>
    </div>

    <h3>⏱️ TIMER</h3>
    <div class="grid difficulty-grid">
        <div class="option time-option" onclick="select('time', this)">30s</div>
        <div class="option time-option active" onclick="select('time', this)">60s</div>
        <div class="option time-option" onclick="select('time', this)">90s</div>
        <div class="option time-option" onclick="select('time', this)">2min</div>
    </div>

    <button class="start-btn" onclick="startGame()">🚀 START GAME!</button>
</div>

<div id="game-screen">
    <div id="team-turn" class="team-indicator">TEAM 1 TURN</div>
    <div id="timer-display" style="font-size: 2rem;">60</div>
    <div class="word-display" id="word-box">READY?</div>
    <button class="start-btn" style="width: 200px;" onclick="nextWord()">NEXT WORD</button>
    <button onclick="location.reload()" style="background:none; border:none; color: gray; margin-top: 20px; cursor: pointer;">QUIT</button>
</div>

<script>
    const data = {
        anime: {
            easy: ["Naruto", "Goku", "Pikachu"],
            medium: ["Luffy", "Tanjiro", "Sailor Moon"],
            hard: ["Edward Elric", "Spike Spiegel", "Light Yagami"],
            extreme: ["Guts", "Madoka Kaname", "Lelouch"]
        },
        cartoons: {
            easy: ["Mickey Mouse", "SpongeBob", "Bugs Bunny"],
            medium: ["Finn the Human", "Danny Phantom", "Scooby-Doo"],
            hard: ["Rick Sanchez", "Bojack Horseman", "Kim Possible"],
            extreme: ["Bill Cipher", "Courage the Cowardly Dog", "Aku"]
        },
        games: {
            easy: ["Mario", "Pac-Man", "Tetris"],
            medium: ["Master Chief", "Link", "Sonic"],
            hard: ["Kratos", "Geralt of Rivia", "Solid Snake"],
            extreme: ["Malenia", "Sans", "Arthas Menethil"]
        }
    };

    let selectedCat = 'anime';
    let selectedDiff = 'easy';
    let currentTeam = 1;

    function select(group, element) {
        // Remove active class from siblings
        let parent = element.parentElement;
        Array.from(parent.children).forEach(child => child.classList.remove('active'));
        element.classList.add('active');

        // Update values
        if(group === 'cat') selectedCat = element.getAttribute('data-type');
        if(group === 'diff') selectedDiff = element.getAttribute('data-val');
    }

    function startGame() {
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'flex';
        document.getElementById('team-turn').innerText = "TEAM " + currentTeam + " TURN";
        nextWord();
    }

    function nextWord() {
        const words = data[selectedCat][selectedDiff];
        const randomWord = words[Math.floor(Math.random() * words.length)];
        document.getElementById('word-box').innerText = randomWord;
    }
</script>

</body>
</html>
