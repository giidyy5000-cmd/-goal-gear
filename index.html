<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tech Troubleshooting Jeopardy</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #1e3c72, #2a5298);
  color: white;
  text-align: center;
}

h1 {
  padding: 20px;
  font-size: 2.5em;
  text-shadow: 2px 2px 5px black;
}

.board {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 10px;
  padding: 20px;
  max-width: 1000px;
  margin: auto;
}

.category {
  background: #111;
  padding: 10px;
  font-weight: bold;
  border-radius: 8px;
  background: linear-gradient(45deg, #ff416c, #ff4b2b);
}

.cell {
  background: #222;
  padding: 25px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 1.2em;
  transition: 0.2s;
  background: linear-gradient(45deg, #00c6ff, #0072ff);
}

.cell:hover {
  transform: scale(1.05);
}

.used {
  background: gray !important;
  cursor: not-allowed;
}

#popup {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: #111;
  padding: 30px;
  border-radius: 12px;
  display: none;
  width: 60%;
  box-shadow: 0 0 20px black;
}

#answer {
  margin-top: 20px;
  color: #00ffcc;
  display: none;
  font-size: 1.3em;
}

button {
  margin-top: 15px;
  padding: 10px 15px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}
</style>
</head>
<body>

<h1>💻 Software Troubleshooting Jeopardy</h1>

<div class="board" id="board"></div>

<div id="popup">
  <div id="question"></div>
  <div id="answer"></div>
  <button onclick="closePopup()">Close</button>
</div>

<script>
const gameData = {
  "Windows": [
    {q:"What do you press to open Task Manager?", a:"Ctrl + Shift + Esc"},
    {q:"What tool checks system files?", a:"sfc /scannow"},
    {q:"Command to check IP?", a:"ipconfig"},
    {q:"Used to uninstall programs?", a:"Control Panel / Settings"},
    {q:"Blue screen error is called?", a:"BSOD"}
  ],
  "Hardware": [
    {q:"What connects CPU to motherboard?", a:"Socket"},
    {q:"Device that stores data long-term?", a:"Hard Drive / SSD"},
    {q:"What powers the PC?", a:"Power Supply (PSU)"},
    {q:"What cools the CPU?", a:"Fan / Heatsink"},
    {q:"Memory used while running programs?", a:"RAM"}
  ],
  "Networking": [
    {q:"What device connects networks?", a:"Router"},
    {q:"What does DNS do?", a:"Converts domain to IP"},
    {q:"What is 192.168.x.x?", a:"Private IP address"},
    {q:"WiFi stands for?", a:"Wireless Fidelity"},
    {q:"What checks connection to another device?", a:"Ping"}
  ],
  "Software": [
    {q:"What is an OS?", a:"Operating System"},
    {q:"Example of open-source OS?", a:"Linux"},
    {q:"What is a bug?", a:"Error in code/software"},
    {q:"What fixes bugs?", a:"Patch / Update"},
    {q:"What is antivirus for?", a:"Remove malware"}
  ],
  "Security": [
    {q:"What is phishing?", a:"Fake emails stealing info"},
    {q:"Strong password rule?", a:"Mix letters numbers symbols"},
    {q:"What is malware?", a:"Malicious software"},
    {q:"Two-factor authentication?", a:"Extra login security"},
    {q:"What protects networks?", a:"Firewall"}
  ]
};

let selectedAnswer = "";

function buildBoard() {
  const board = document.getElementById("board");

  Object.keys(gameData).forEach(category => {
    let catDiv = document.createElement("div");
    catDiv.className = "category";
    catDiv.innerText = category;
    board.appendChild(catDiv);
  });

  for (let i = 0; i < 5; i++) {
    Object.keys(gameData).forEach(category => {
      let cell = document.createElement("div");
      cell.className = "cell";
      cell.innerText = "$" + ((i + 1) * 100);

      cell.onclick = function () {
        if (cell.classList.contains("used")) return;

        let item = gameData[category][i];
        document.getElementById("question").innerText = item.q;
        document.getElementById("answer").innerText = "Answer: " + item.a;
        document.getElementById("answer").style.display = "none";
        selectedAnswer = item.a;

        document.getElementById("popup").style.display = "block";
        cell.classList.add("used");
      };

      board.appendChild(cell);
    });
  }
}

function closePopup() {
  document.getElementById("popup").style.display = "none";
}

document.addEventListener("keydown", function(e) {
  if (e.code === "Space") {
    document.getElementById("answer").style.display = "block";
  }
});

buildBoard();
</script>

</body>
</html>
