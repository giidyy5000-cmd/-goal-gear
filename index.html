<!DOCTYPE html>
<html>
<head>
    <title>Heads Up Game</title>

    <style>
        body {
            font-family: Arial;
            background-color: #111;
            color: white;
            text-align: center;
        }

        .card {
            background: #222;
            margin: 40px auto;
            padding: 30px;
            width: 60%;
            border-radius: 15px;
        }

        h1 { color: gold; }

        #word {
            font-size: 40px;
            margin: 20px;
        }

        button {
            padding: 10px;
            margin: 5px;
            width: 160px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .correct { background: green; }
        .skip { background: red; }
        .topic { background: blue; }
        .difficulty { background: purple; }
    </style>
</head>

<body>

<h1>🎮 Heads Up Game</h1>

<div class="card">

    <h2>Select Topic</h2>
    <button class="topic" onclick="setTopic('anime')">🎌 Anime</button>
    <button class="topic" onclick="setTopic('cartoons')">📺 Cartoons</button>
    <button class="topic" onclick="setTopic('games')">🎮 Games</button>

    <h2>Select Difficulty</h2>
    <button class="difficulty" onclick="setDifficulty('easy')">Easy</button>
    <button class="difficulty" onclick="setDifficulty('medium')">Medium</button>
    <button class="difficulty" onclick="setDifficulty('hard')">Hard</button>
    <button class="difficulty" onclick="setDifficulty('extreme')">Extra Hard</button>

    <h2 id="teamTurn">Pick topic & difficulty</h2>

    <div id="word">---</div>

    <button onclick="startTurn()">Start Turn</button><br>

    <button class="correct" onclick="correct()">✅ Correct</button>
    <button class="skip" onclick="skip()">⏭️ Skip</button>

    <h3 id="scores">Team 1: 0 | Team 2: 0</h3>
    <h2 id="winner"></h2>

</div>

<script>
let data = {
    anime: {
        easy: ["Naruto", "Goku", "Luffy"],
        medium: ["Sasuke", "Vegeta", "Zoro"],
        hard: ["Itadori", "Killua", "Eren Yeager"],
        extreme: ["Gojo Satoru", "Hisoka", "Kaneki Ken"]
    },
    cartoons: {
        easy: ["SpongeBob", "Scooby-Doo", "Tom"],
        medium: ["Ben 10", "Finn", "Gumball"],
        hard: ["Danny Phantom", "Samurai Jack", "Aang"],
        extreme: ["Courage", "Mordecai", "Rick Sanchez"]
    },
    games: {
        easy: ["Mario", "Minecraft", "Roblox"],
        medium: ["Fortnite", "Zelda", "Pokemon"],
        hard: ["Kratos", "Master Chief", "Geralt"],
        extreme: ["Sekiro", "Solid Snake", "Arthur Morgan"]
    }
};

let currentTopic = "";
let currentDifficulty = "";
let team = 1;
let score1 = 0;
let score2 = 0;
let timer;
let timeLeft = 30;

function setTopic(topic) {
    currentTopic = topic;
    updateStatus();
}

function setDifficulty(level) {
    currentDifficulty = level;
    updateStatus();
}

function updateStatus() {
    document.getElementById("teamTurn").innerText =
        "Topic: " + currentTopic + " | Difficulty: " + currentDifficulty;
}

function startTurn() {
    if (!currentTopic || !currentDifficulty) {
        alert("Pick topic AND difficulty!");
        return;
    }

    document.getElementById("winner").innerText = "";
    document.getElementById("teamTurn").innerText = "Team " + team + " Turn";

    timeLeft = 30;
    nextWord();

    timer = setInterval(() => {
        timeLeft--;
        if (timeLeft <= 0) {
            clearInterval(timer);
            switchTeam();
        }
    }, 1000);
}

function nextWord() {
    let words = data[currentTopic][currentDifficulty];
    let randomIndex = Math.floor(Math.random() * words.length);
    document.getElementById("word").innerText = words[randomIndex];
}

function correct() {
    if (team === 1) score1++;
    else score2++;

    updateScores();
    nextWord();
}

function skip() {
    nextWord();
}

function updateScores() {
    document.getElementById("scores").innerText =
        "Team 1: " + score1 + " | Team 2: " + score2;
}

function switchTeam() {
    if (team === 1) {
        team = 2;
        document.getElementById("word").innerText = "Switch to Team 2!";
    } else {
        endGame();
    }
}

function endGame() {
    document.getElementById("word").innerText = "Game Over";

    if (score1 > score2) {
        document.getElementById("winner").innerText = "🏆 Team 1 Wins!";
    } else if (score2 > score1) {
        document.getElementById("winner").innerText = "🏆 Team 2 Wins!";
    } else {
        document.getElementById("winner").innerText = "It's a Tie!";
    }
}
</script>

</body>
</html>
