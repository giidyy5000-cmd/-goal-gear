<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CompTIA 1201 Software Troubleshooting Jeopardy</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #141e30, #243b55);
  color: white;
  text-align: center;
}

/* LOGIN SCREEN */
#loginScreen {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #0b0f1a;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 10;
}

.login-box {
  background: rgba(255,255,255,0.08);
  padding: 25px;
  border-radius: 12px;
}

input {
  padding: 10px;
  margin: 5px;
  border-radius: 6px;
  border: none;
}

/* GAME */
#game {
  display: none;
}

h1 {
  margin: 10px;
}

/* SCOREBOARD */
.scoreboard {
  display: flex;
  justify-content: center;
  gap: 60px;
  font-size: 1.2em;
  margin: 10px;
}

.team-box {
  background: rgba(255,255,255,0.1);
  padding: 10px;
  border-radius: 10px;
  min-width: 180px;
}

button {
  margin: 3px;
  padding: 5px 10px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

.plus { background: #00c853; color: white; }
.minus { background: #d50000; color: white; }

/* BOARD */
.board {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
  padding: 20px;
  max-width: 1000px;
  margin: auto;
}

.category {
  background: linear-gradient(45deg, #ff9800, #ff5722);
  padding: 10px;
  font-weight: bold;
  border-radius: 8px;
}

.cell {
  background: linear-gradient(45deg, #2196f3, #00bcd4);
  padding: 25px;
  border-radius: 10px;
  cursor: pointer;
}

.cell.used {
  background: gray;
  pointer-events: none;
}

/* POPUP */
#popup {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: #111;
  padding: 25px;
  border-radius: 10px;
  width: 60%;
  display: none;
  z-index: 5;
}

#answer {
  margin-top: 15px;
  color: #00ffcc;
  display: none;
}
</style>
</head>

<body>

<!-- 🔐 LOGIN -->
<div id="loginScreen">
  <h1>🔐 CompTIA Jeopardy Login</h1>

  <div class="login-box">
    <input id="team1Input" placeholder="Enter Team 1 Name">
    <br>
    <input id="team2Input" placeholder="Enter Team 2 Name">
    <br><br>
    <button onclick="startGame()">Start Game</button>
  </div>
</div>

<!-- 🎮 GAME -->
<div id="game">

<h1>💻 CompTIA 1201 Software Troubleshooting Jeopardy</h1>

<div class="scoreboard">
  <div class="team-box">
    <div id="name1">Team 1</div>
    Score: <span id="p1">0</span><br>
    <button class="plus" onclick="addScore(1,100)">+100</button>
    <button class="minus" onclick="addScore(1,-100)">-100</button>
  </div>

  <div class="team-box">
    <div id="name2">Team 2</div>
    Score: <span id="p2">0</span><br>
    <button class="plus" onclick="addScore(1,100)">+100</button>
    <button class="minus" onclick="addScore(1,-100)">-100</button>
  </div>
</div>

<div class="board" id="board"></div>

</div>

<!-- POPUP -->
<div id="popup">
  <div id="question"></div>
  <div id="answer"></div>
  <button onclick="closePopup()">Close</button>
</div>

<script>

/* 🔐 LOGIN FUNCTION */
function startGame() {
  let t1 = document.getElementById("team1Input").value || "Team 1";
  let t2 = document.getElementById("team2Input").value || "Team 2";

  document.getElementById("name1").innerText = t1;
  document.getElementById("name2").innerText = t2;

  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("game").style.display = "block";
}

/* ➕ SCORE */
function addScore(team, val) {
  let el = document.getElementById(team === 1 ? "p1" : "p2");
  el.innerText = parseInt(el.innerText) + val;
}

/* 🎮 GAME DATA */
const gameData = {
  "Windows": [
    {q:"Shortcut for Task Manager?", a:"Ctrl + Shift + Esc"},
    {q:"Fix system files command?", a:"sfc /scannow"},
    {q:"Check IP command?", a:"ipconfig"},
    {q:"Uninstall apps location?", a:"Settings / Control Panel"},
    {q:"Blue screen called?", a:"BSOD"}
  ],
  "Hardware": [
    {q:"Stores data permanently?", a:"SSD / HDD"},
    {q:"Powers PC?", a:"PSU"},
    {q:"Cools CPU?", a:"Fan"},
    {q:"What is RAM?", a:"Temporary memory"},
    {q:"Main board?", a:"Motherboard"}
  ],
  "Networking": [
    {q:"Gives WiFi?", a:"Router"},
    {q:"DNS does?", a:"Domain to IP"},
    {q:"Checks connection?", a:"Ping"},
    {q:"Private IP?", a:"192.168.x.x"},
    {q:"ISP means?", a:"Internet Provider"}
  ],
  "Software": [
    {q:"OS stands for?", a:"Operating System"},
    {q:"Linux type?", a:"Open source"},
    {q:"Bug is?", a:"Software error"},
    {q:"Fix bugs?", a:"Patch"},
    {q:"Antivirus does?", a:"Removes malware"}
  ],
  "Security": [
    {q:"Phishing?", a:"Fake scam email"},
    {q:"Malware?", a:"Bad software"},
    {q:"Firewall?", a:"Protection system"},
    {q:"2FA?", a:"Extra login step"},
    {q:"Strong password?", a:"Mixed characters"}
  ]
};

/* 📊 BUILD BOARD */
function buildBoard() {
  const board = document.getElementById("board");

  Object.keys(gameData).forEach(cat => {
    let c = document.createElement("div");
    c.className = "category";
    c.innerText = cat;
    board.appendChild(c);
  });

  for (let i = 0; i < 5; i++) {
    Object.keys(gameData).forEach(cat => {
      let cell = document.createElement("div");
      cell.className = "cell";
      cell.innerText = (i + 1) * 100;

      cell.onclick = function () {
        if (cell.classList.contains("used")) return;

        let item = gameData[cat][i];

        document.getElementById("question").innerText = item.q;
        document.getElementById("answer").innerText = "Answer: " + item.a;
        document.getElementById("answer").style.display = "none";

        document.getElementById("popup").style.display = "block";
        cell.classList.add("used");
      };

      board.appendChild(cell);
    });
  }
}

/* ❌ CLOSE POPUP */
function closePopup() {
  document.getElementById("popup").style.display = "none";
}

/* ⌨️ SPACEBAR SHOW ANSWER */
document.addEventListener("keydown", function(e) {
  if (e.code === "Space") {
    document.getElementById("answer").style.display = "block";
  }
});

buildBoard();
</script>

</body>
</html>
